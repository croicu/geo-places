name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      areas:
        description: "Comma-separated area ids to force-rebuild, or 'all'. Empty = auto-diff against the live site."
        required: false
        default: ""

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build changed area(s)
        env:
          GEO_PLACES_INCREMENTAL: "1"
          GEO_PLACES_REBUILD_AREAS: ${{ github.event.inputs.areas }}
        run: bash build.sh

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=geo-places --branch=main --commit-dirty=true
