name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      areas:
        description: "Comma-separated area ids to force-rebuild, or 'all'. Empty = auto-diff against the live site."
        required: false
        default: ""

jobs:
  deploy:
    name: Build and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build changed area(s)
        env:
          GEO_PLACES_INCREMENTAL: "1"
          GEO_PLACES_REBUILD_AREAS: ${{ github.event.inputs.areas }}
        run: bash build.sh

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=geo-places --branch=main --commit-dirty=true

      - name: Mirror out/ to geo-places-baseline
        if: success()
        env:
          GH_TOKEN: ${{ secrets.BASELINE_REPO_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/geo-places-baseline
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/croicu/geo-places-baseline.git" /tmp/geo-places-baseline
          rsync -a --delete --exclude=.git out/ /tmp/geo-places-baseline/
          cd /tmp/geo-places-baseline
          git add -A
          git diff --cached --quiet || git commit -m "chore: mirror out/ from geo-places@${GITHUB_SHA}"
          git push origin main
