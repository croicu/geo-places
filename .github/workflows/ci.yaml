name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate public/ catalog and manifests (no network)
        run: |
          pip install --quiet pytest
          pytest tests/ci/test_catalog.py -v

      - name: Build against fake provider (validates the pipeline, no network)
        env:
          GEO_PLACES_CATALOG_DIR: ${{ github.workspace }}/tests/data
          GEO_PLACES_TASKS_PATH: ${{ github.workspace }}/tests/data/areas/citest/manifest.json
        run: bash build.sh
